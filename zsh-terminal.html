<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>zsh.js terminal demo</title>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    zsh-terminal {
      display: block;
      height: 100%;
    }
  </style>
  <script src="./dist/zsh.min.js"></script>
</head>

<body>
  <zsh-terminal></zsh-terminal>

  <template id="zsh-template">
    <style>
      @import './dist/zsh.min.css';
    </style>
  </template>

  <script>
    var template = document.querySelector('#zsh-template');

    class ZshTerminalElement extends HTMLElement {
      connectedCallback() {
        if (this.shadowRoot) {
          return;
        }

        var root = this.attachShadow({ mode: 'open' });
        root.appendChild(document.importNode(template.content, true));

        var placeholder = document.createElement('div');
        new ZSH(placeholder, null, true);
        root.appendChild(placeholder.firstChild);
      }
    }

    customElements.define('zsh-terminal', ZshTerminalElement);
  </script>
</body>

</html>
